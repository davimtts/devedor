<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PainelDoDevedor</title>
    <link rel="stylesheet" href="css/devedor.css">
    <link rel="icon" href="img/icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <div id="loading">
        <h1>Carregando...</h1>
    </div>
    <div class="logo">
        <img src="img/fintech.png" alt="Logo">
    </div>
    <div id="pinScreen">
        <h1>Inserir PIN</h1>
        <input id="pinInput" placeholder="Digite o PIN">
        <button class="btn-magic" onclick="entrarPin()">
            Entrar
        </button>

        <div class="pin-exemplo">
            <p>
                O PIN normalmente já vem no link enviado.
            </p>
            <div>
                https://davimtts.github.io/devedor/?PIN=<span>ABC123</span>
            </div>
        </div>

    </div>
    <div class="wrap" id="app">
        <h1 id="nameUser"></h1>
        <div class="top">
            <div class="card">
                <label>Total dívida</label>
                <input id="total" type="number" value="1800" step="0.01" disabled>
            </div>
            <div class="card">
                <label>Juros %</label>
                <input id="taxa" type="number" value="0" step="0.01" disabled>
            </div>
            <div class="card">
                <label>Parcelas</label>
                <select id="parcelas"></select>
            </div>
            <div class="card">
                <label>Parcelas automáticas</label>
                <select id="modoTotal">
                    <option value="on">ON</option>
                    <option value="off">OFF</option>

                </select>
            </div>
        </div>
        <div id="table"></div>
        <div class="sum">
            Juros total:
            <span class="juros" id="jurosTotal">0,00</span>
        </div>
        <div class="sumT">
            Total das parcelas:
            <span class="totalPag" id="parcelasTotal">0,00</span>
        </div>
        <div class="footer">
            <div>Criado por <a href="https://github.com/davimtts" target="_blank">davimtts</a></div>
            <i class="fa-brands fa-github"></i>
        </div>

    </div>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="app/devedor.js"></script>

</html>
