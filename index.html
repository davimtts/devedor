<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PainelDoDevedor</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial;
        }

        .hidden {
            display: none;
        }

        .pin-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 30px;
            text-align: center;
        }

        .pin-screen input {
            width: 300px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            margin-top: 20px;
            font-size: 18px;
        }

        .pin-screen button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .exemplo {
            margin-top: 30px;
            background: #1d1d1d;
            padding: 20px;
            border-radius: 12px;
            word-break: break-all;
        }

        .exemplo span {
            color: #b26cff;
            font-weight: bold;
        }

        .wrap {
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 60px 1fr 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .row {
            align-items: center;
        }

        .head {
            font-weight: bold;
        }

        .paga input {
            opacity: .6;
            pointer-events: none;
            background: #2d2d2d;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div id="pinScreen" class="pin-screen hidden">

        <h1>Inserir PIN</h1>

        <p>
            O PIN normalmente já vem no link enviado.
        </p>

        <div class="exemplo">
            https://davimtts.github.io/simulador?<span>codigo=FC3AH8</span>
        </div>

        <input id="pinInput" placeholder="Digite o PIN">

        <button onclick="entrarPin()">
            Entrar
        </button>

    </div>

    <div class="wrap hidden" id="app">

        <h1>PainelDoDevedor</h1>

        <h3 id="nomeDevedor"></h3>

        <div class="top">

            <div class="card">
                <label>Total dívida</label>
                <input id="total" type="number" disabled>
            </div>

            <div class="card">
                <label>Juros %</label>
                <input id="taxa" type="number" disabled>
            </div>

            <div class="card">
                <label>Parcelas</label>
                <select id="parcelas" disabled></select>
            </div>

        </div>

        <div id="table"></div>

    </div>

<script>

const params = new URLSearchParams(location.search);
const codigo = params.get('codigo');

const app = document.getElementById('app');
const pinScreen = document.getElementById('pinScreen');

const totalEl = document.getElementById('total');
const taxaEl = document.getElementById('taxa');
const parcelasEl = document.getElementById('parcelas');
const table = document.getElementById('table');

const nomeEl = document.getElementById('nomeDevedor');

let pagamentos = [];
let pagas = [];

function br(v) {
    return Number(v).toLocaleString('pt-BR', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function juros(v) {
    return +(v * (+taxaEl.value / 100)).toFixed(2);
}

function entrarPin() {

    const pin = document.getElementById('pinInput').value.trim();

    location.href = '?codigo=' + pin;
}

async function carregar() {

    if (!codigo) {

        pinScreen.classList.remove('hidden');

        return;
    }

    try {

        const req = await fetch('./pins/' + codigo + '.json');

        if (!req.ok) {
            throw new Error('PIN inválido');
        }

        const dados = await req.json();

        app.classList.remove('hidden');

        nomeEl.textContent = 'Devedor: ' + dados.nome;

        totalEl.value = dados.total;
        taxaEl.value = dados.taxa;

        pagamentos = dados.valores;
        pagas = dados.pagas;

        parcelasEl.innerHTML = '';

        for (let i = 1; i <= dados.parcelas; i++) {

            const op = document.createElement('option');

            op.textContent = i;

            parcelasEl.appendChild(op);
        }

        render();

    } catch (e) {

        pinScreen.classList.remove('hidden');

        alert('PIN não encontrado');

    }
}

function render() {

    table.innerHTML = '';

    let falta = +totalEl.value;

    const head = document.createElement('div');

    head.className = 'grid head';

    head.innerHTML = `
        <div>#</div>
        <div>Amortização</div>
        <div>Saldo</div>
        <div>Juros</div>
        <div>Parcela</div>
    `;

    table.appendChild(head);

    pagamentos.forEach((p, i) => {

        const j = juros(falta);

        const total = +(p + j).toFixed(2);

        const row = document.createElement('div');

        row.className = 'grid row';

        if (pagas.includes(i)) {
            row.classList.add('paga');
        }

        row.innerHTML = `
            <div>${i + 1}º</div>

            <div>
                <input 
                    value="${p.toFixed(2)}"
                    ${pagas.includes(i) ? 'disabled' : ''}
                >
            </div>

            <div>${br(falta)}</div>

            <div>${br(j)}</div>

            <div>
                <input 
                    value="${total.toFixed(2)}"
                    ${pagas.includes(i) ? 'disabled' : ''}
                >
            </div>
        `;

        table.appendChild(row);

        falta = +(falta - p).toFixed(2);

    });

}

carregar();

</script>

</body>
</html>
