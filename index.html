<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PainelDoDevedor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="_img/icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>
    <div id="loading" style="
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;
        padding:20px;
        text-align:center;
        ">
        <h1>Carregando...</h1>
    </div>
    <div class="logo">
        <img src="./_img/fintech.png" alt="Logo">
        Fintech Nexus
    </div>
    <div id="pinScreen" style="
        display:none;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;
        padding:20px;
        text-align:center;
        ">

        <h1>Inserir PIN</h1>

        <p>
            O PIN normalmente já vem no link enviado.
        </p>

        <p style="margin-top:20px;">
            Exemplo:
        </p>

        <div style="
    background:#1d1d1d;
    padding:15px;
    border-radius:10px;
    color:#b26cff;
    font-weight:bold;
    ">
            https://davimtts.github.io/simulador/?PIN=ABC123
        </div>

        <input id="pinInput" placeholder="Digite o PIN" style="
        margin-top:20px;
        padding:15px;
        width:300px;
        border:none;
        border-radius:10px;
        ">

        <button onclick="entrarPin()" style="
        margin-top:15px;
        padding:12px 20px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        ">
            Entrar
        </button>

    </div>
    <div class="wrap" id="app">

        <h1 id="nameUser"></h1>

        <div class="top">

            <div class="card">
                <label>Total dívida</label>
                <input id="total" type="number" value="1800" step="0.01" disabled>
            </div>

            <div class="card">
                <label>Juros %</label>
                <input id="taxa" type="number" value="0" step="0.01" disabled>
            </div>

            <div class="card">
                <label>Parcelas</label>
                <select id="parcelas"></select>
            </div>

            <div class="card">
                <label>Total automático</label>
                <select id="modoTotal">
                    <option value="on">ON</option>
                    <option value="off">OFF</option>

                </select>
            </div>

        </div>

        <div id="table"></div>

        <div class="sum">
            Juros total:
            <span class="juros" id="jurosTotal">0,00</span>
        </div>
        <div class="sumT">
            Total das parcelas:
            <span class="totalPag" id="parcelasTotal">0,00</span>
        </div>
        <div class="footer">
            Criado por <a href="https://github.com/davimtts" target="_blank">davimtts</a>
        </div>

    </div>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="app/script.js"></script>

</html>
